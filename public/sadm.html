<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3 分鐘關係狀態測驗｜BF Tarot x SADM</title>
  <style>
    :root {
      --ivory: #f8f1e6;
      --ivory-deep: #eee3d2;
      --paper: rgba(255, 250, 240, 0.92);
      --navy: #071630;
      --navy-soft: #17304f;
      --bronze: #a17b45;
      --bronze-soft: rgba(161, 123, 69, 0.28);
      --mist: rgba(218, 226, 231, 0.48);
      --ink-muted: rgba(7, 22, 48, 0.68);
      --shadow: 0 28px 80px rgba(7, 22, 48, 0.16);
      --soft-shadow: 0 14px 38px rgba(7, 22, 48, 0.1);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-width: 320px;
      margin: 0;
      font-family: "Noto Serif TC", "Songti TC", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", serif;
      color: var(--navy);
      background:
        radial-gradient(circle at 18% 6%, rgba(161, 123, 69, 0.22), transparent 25%),
        radial-gradient(circle at 84% 14%, rgba(7, 22, 48, 0.12), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(161, 123, 69, 0.15), transparent 30%),
        linear-gradient(145deg, #fbf6ec 0%, var(--ivory) 42%, #ede3d4 100%);
      line-height: 1.75;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(circle, rgba(161, 123, 69, 0.42) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(7, 22, 48, 0.14) 0 1px, transparent 1.5px);
      background-position: 12px 22px, 78px 94px;
      background-size: 118px 118px, 172px 172px;
      opacity: 0.5;
    }

    body::after {
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,0.34), transparent),
        radial-gradient(circle at 50% 30%, transparent 0 38%, rgba(7, 22, 48, 0.04) 58%, transparent 72%);
      mix-blend-mode: multiply;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(980px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .tarot-shell {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 56px);
      border: 1.5px solid var(--bronze);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,250,240,0.94), rgba(248,241,230,0.9)),
        radial-gradient(circle at 50% 42%, rgba(7, 22, 48, 0.08), transparent 34%);
      box-shadow: var(--shadow);
    }

    .tarot-shell::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(161, 123, 69, 0.68);
      border-radius: 28px;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      color: var(--bronze);
      z-index: 2;
    }
    .corner::before,
    .corner::after {
      content: "";
      position: absolute;
      background: currentColor;
    }
    .corner::before { width: 1px; height: 30px; left: 14px; top: 0; }
    .corner::after { height: 1px; width: 30px; top: 14px; left: 0; }
    .corner span {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      left: 11px;
      top: 11px;
    }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: rotate(90deg); }
    .corner.bl { bottom: 24px; left: 24px; transform: rotate(-90deg); }
    .corner.br { bottom: 24px; right: 24px; transform: rotate(180deg); }

    .screen {
      display: none;
      position: relative;
      z-index: 1;
      padding: clamp(34px, 6vw, 72px);
    }
    .screen.active { display: block; }

    .hero {
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .eyebrow,
    .card-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      color: var(--bronze);
      font-size: 0.92rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .eyebrow::before,
    .eyebrow::after,
    .card-count::before,
    .card-count::after {
      content: "";
      width: clamp(42px, 9vw, 110px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--bronze), transparent);
    }

    .hero h1,
    .card-title,
    .result-name {
      margin: 20px 0 0;
      color: var(--navy);
      font-weight: 800;
      letter-spacing: 0.06em;
      line-height: 1.18;
    }

    .hero h1 {
      max-width: 820px;
      font-size: clamp(2.35rem, 8vw, 5.8rem);
    }

    .hero-subtitle {
      max-width: 680px;
      margin: 24px auto 0;
      color: var(--navy-soft);
      font-size: clamp(1.08rem, 2.4vw, 1.55rem);
      letter-spacing: 0.08em;
    }

    .powered {
      margin: 18px 0 0;
      color: var(--ink-muted);
      font-size: 0.94rem;
      letter-spacing: 0.14em;
    }

    .cosmos-panel {
      position: relative;
      overflow: hidden;
      max-width: 760px;
      min-height: 230px;
      margin: 34px auto 30px;
      border: 1px solid rgba(161, 123, 69, 0.55);
      border-radius: 34px;
      background:
        radial-gradient(circle at 36% 48%, rgba(244, 213, 154, 0.78) 0 6%, transparent 14%),
        radial-gradient(circle at 45% 45%, rgba(255, 240, 192, 0.18), transparent 23%),
        radial-gradient(circle at 68% 26%, rgba(255,255,255,0.18), transparent 12%),
        linear-gradient(105deg, #263956 0%, #0a1932 48%, #051026 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16), var(--soft-shadow);
    }

    .cosmos-panel::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle at 70% 60%, rgba(226, 186, 112, 0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle at 44% 52%, transparent 0 8%, rgba(161, 123, 69, 0.46) 8.4% 8.7%, transparent 9.2%),
        radial-gradient(circle at 44% 52%, transparent 0 15%, rgba(161, 123, 69, 0.36) 15.4% 15.8%, transparent 16.2%);
      background-size: 130px 130px, 170px 170px, 100% 100%, 100% 100%;
      animation: drift 20s linear infinite;
    }

    .cosmos-panel::after {
      content: "◐";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -52%);
      color: rgba(248, 226, 176, 0.94);
      font-size: clamp(7.5rem, 22vw, 13rem);
      line-height: 1;
      text-shadow: 0 0 28px rgba(226, 186, 112, 0.48);
    }

    .speech {
      position: absolute;
      z-index: 1;
      min-width: 78px;
      height: 42px;
      border: 1px solid rgba(248, 226, 176, 0.45);
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      color: rgba(248, 226, 176, 0.82);
      display: grid;
      place-items: center;
      letter-spacing: 0.2em;
      backdrop-filter: blur(4px);
    }
    .speech.one { left: 18%; top: 30%; }
    .speech.two { right: 14%; top: 24%; opacity: 0.65; }
    .speech.three { left: 25%; bottom: 18%; color: #f4c987; }
    .speech.four { right: 24%; bottom: 20%; opacity: 0.5; }

    @keyframes drift {
      from { transform: translate3d(0,0,0) rotate(0deg); }
      to { transform: translate3d(4%, -3%, 0) rotate(1deg); }
    }

    .primary-btn,
    .ghost-btn,
    .option-btn {
      border: 1px solid var(--bronze-soft);
      border-radius: var(--radius-md);
      background: rgba(255, 250, 240, 0.72);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .primary-btn {
      min-height: 56px;
      padding: 15px 28px;
      background: var(--navy);
      color: #fffaf0;
      border-color: var(--navy);
      box-shadow: 0 14px 30px rgba(7, 22, 48, 0.22);
      font-weight: 800;
      letter-spacing: 0.1em;
    }

    .ghost-btn {
      min-height: 50px;
      padding: 12px 20px;
      color: var(--navy-soft);
      font-weight: 700;
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .option-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--soft-shadow);
    }

    .primary-btn:focus-visible,
    .ghost-btn:focus-visible,
    .option-btn:focus-visible {
      outline: 3px solid rgba(161, 123, 69, 0.42);
      outline-offset: 3px;
    }

    .quiz-wrap {
      min-height: calc(100vh - 56px);
      display: grid;
      align-items: center;
    }

    .card {
      position: relative;
      max-width: 790px;
      margin: 0 auto;
      padding: clamp(24px, 5vw, 46px);
      border: 1px solid rgba(161, 123, 69, 0.62);
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255,250,240,0.96), rgba(248,241,230,0.9)),
        radial-gradient(circle at 50% 15%, rgba(161,123,69,0.14), transparent 25%);
      box-shadow: var(--soft-shadow);
    }

    .card::before {
      content: "☾     ✦     ☽";
      display: block;
      text-align: center;
      color: rgba(161, 123, 69, 0.9);
      letter-spacing: 0.36em;
      margin-bottom: 18px;
      font-size: 1.3rem;
    }

    .progress-bar {
      height: 7px;
      overflow: hidden;
      border: 1px solid rgba(161,123,69,0.35);
      border-radius: 999px;
      background: rgba(161,123,69,0.1);
      margin: 24px 0 10px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--bronze), #d6b87d);
      transition: width 220ms ease;
    }

    .card-title {
      font-size: clamp(2rem, 7vw, 4.6rem);
      text-align: center;
    }

    .question {
      max-width: 650px;
      margin: 20px auto 0;
      padding: 18px clamp(16px, 4vw, 26px);
      border: 1px solid rgba(161,123,69,0.32);
      border-radius: 22px;
      background: rgba(255,255,255,0.42);
      color: var(--navy-soft);
      text-align: center;
      font-size: clamp(1.08rem, 2.6vw, 1.35rem);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .measure {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 0;
    }

    .measure[hidden] { display: none; }

    .measure span,
    .metric-name {
      border: 1px solid rgba(161,123,69,0.35);
      border-radius: 999px;
      padding: 4px 12px;
      background: rgba(255,255,255,0.36);
      color: var(--ink-muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 30px 0 0;
    }

    .option-btn {
      min-height: 72px;
      padding: 14px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--navy);
      font-size: clamp(1.03rem, 2.4vw, 1.22rem);
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .option-number {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--navy);
      color: #fffaf0;
      font-family: Georgia, serif;
      font-size: 1.25rem;
      line-height: 1;
    }

    .option-btn.selected {
      background: rgba(7, 22, 48, 0.96);
      border-color: var(--navy);
      color: #fffaf0;
    }
    .option-btn.selected .option-number {
      background: #fffaf0;
      color: var(--navy);
    }

    .card-note {
      margin: 26px auto 0;
      padding-top: 18px;
      max-width: 660px;
      border-top: 1px solid rgba(161,123,69,0.34);
      color: var(--ink-muted);
      text-align: center;
      letter-spacing: 0.08em;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }

    .status-text {
      color: var(--ink-muted);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-align: right;
    }

    .pause {
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .pause-card,
    .result-card {
      max-width: 760px;
      margin: 0 auto;
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid rgba(161, 123, 69, 0.62);
      border-radius: 34px;
      background: var(--paper);
      box-shadow: var(--soft-shadow);
    }

    .pause-symbol {
      margin: 0 auto 18px;
      width: 112px;
      height: 112px;
      border: 1px solid rgba(161, 123, 69, 0.5);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--bronze);
      font-size: 4rem;
      background: radial-gradient(circle, rgba(161,123,69,0.16), transparent 64%);
    }

    .pause h2,
    .result-kicker {
      margin: 0;
      color: var(--bronze);
      letter-spacing: 0.18em;
      font-size: 1rem;
    }

    .pause p {
      margin: 16px auto 28px;
      max-width: 560px;
      color: var(--navy);
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      line-height: 1.7;
      letter-spacing: 0.08em;
    }

    .result-card {
      max-width: 840px;
    }

    .result-kicker { text-align: center; }

    .result-name {
      text-align: center;
      font-size: clamp(2.05rem, 7vw, 4.2rem);
    }

    .result-translation {
      margin: 18px auto 0;
      max-width: 680px;
      color: var(--navy);
      font-size: clamp(1.18rem, 3vw, 1.6rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .insight {
      margin: 18px auto 0;
      max-width: 680px;
      color: var(--navy-soft);
      font-size: clamp(1.02rem, 2.4vw, 1.2rem);
      letter-spacing: 0.05em;
      text-align: center;
    }

    .insight p { margin: 0; }
    .insight p + p { margin-top: 8px; }

    .stuck-panel {
      margin: 30px 0 0;
      padding: 20px;
      border: 1px solid rgba(161,123,69,0.34);
      border-radius: 22px;
      background: rgba(255,255,255,0.34);
    }

    .stuck-panel h3 {
      margin: 0;
      color: var(--bronze);
      letter-spacing: 0.12em;
      font-size: 1rem;
    }

    .metrics {
      margin: 16px 0 0;
      display: grid;
      gap: 13px;
    }

    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(161,123,69,0.22);
      border-radius: 18px;
      background: rgba(248,241,230,0.58);
    }

    .metric p {
      margin: 8px 0 0;
      color: var(--ink-muted);
      font-size: 0.94rem;
      line-height: 1.65;
      letter-spacing: 0.04em;
    }

    .metric-level {
      min-width: 52px;
      min-height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fffaf0;
      font-weight: 900;
      letter-spacing: 0.12em;
      background: var(--bronze);
    }

    .metric-level.high { background: var(--navy); }
    .metric-level.medium { background: var(--bronze); }
    .metric-level.low { background: rgba(7,22,48,0.52); }

    .advice {
      margin: 30px 0 0;
      padding: 20px;
      border: 1px solid rgba(161,123,69,0.34);
      border-radius: 22px;
      background: rgba(255,255,255,0.42);
    }

    .advice h3 {
      margin: 0 0 8px;
      color: var(--bronze);
      letter-spacing: 0.12em;
      font-size: 1rem;
    }

    .advice p { margin: 0; color: var(--navy-soft); }

    .cta-box {
      margin: 24px 0 0;
      padding: 18px;
      border-radius: 22px;
      background: rgba(7,22,48,0.96);
      color: #fffaf0;
      text-align: center;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 18px, 980px);
        padding: 9px 0 28px;
      }

      .tarot-shell {
        min-height: calc(100vh - 18px);
        border-radius: 24px;
      }

      .tarot-shell::before { inset: 7px; border-radius: 19px; }
      .corner { display: none; }
      .screen { padding: 28px 18px; }
      .hero, .quiz-wrap, .pause { min-height: calc(100vh - 18px); }
      .hero h1 { letter-spacing: 0.03em; }
      .hero-subtitle { letter-spacing: 0.04em; }
      .eyebrow, .card-count { gap: 8px; letter-spacing: 0.13em; }
      .eyebrow::before, .eyebrow::after, .card-count::before, .card-count::after { width: 34px; }
      .cosmos-panel { min-height: 185px; border-radius: 26px; margin: 26px auto; }
      .speech { min-width: 58px; height: 34px; font-size: 0.8rem; }
      .card { padding: 24px 14px; border-radius: 24px; }
      .card-title { letter-spacing: 0.025em; }
      .options { grid-template-columns: 1fr; gap: 11px; }
      .option-btn { width: 100%; min-height: 62px; padding: 12px; }
      .nav-row { align-items: stretch; flex-direction: column; }
      .ghost-btn, .primary-btn { width: 100%; min-height: 54px; }
      .status-text { text-align: center; }
      .metric { grid-template-columns: 1fr; gap: 10px; }
      .metric-level { justify-self: start; width: 48px; height: 48px; }
      .pause-card, .result-card { padding: 26px 16px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="tarot-shell" aria-live="polite">
      <div class="corner tl"><span></span></div>
      <div class="corner tr"><span></span></div>
      <div class="corner bl"><span></span></div>
      <div class="corner br"><span></span></div>

      <section id="startScreen" class="screen hero active">
        <div>
          <div class="eyebrow">BF Tarot Relationship State</div>
          <h1>你是真的被愛，還是只是一直被需要？</h1>
          <p class="hero-subtitle">3 分鐘測出你在這段關係裡，是被滋養、被牽動，還是正在被消耗。</p>
          <p class="powered">Powered by SADM 關係決策整理系統</p>
          <div class="cosmos-panel" aria-hidden="true">
            <span class="speech one">•••</span>
            <span class="speech two">••••</span>
            <span class="speech three">♡</span>
            <span class="speech four">••</span>
          </div>
          <button class="primary-btn" type="button" id="startBtn">開始測我的關係狀態</button>
        </div>
      </section>

      <section id="quizScreen" class="screen quiz-wrap">
        <article class="card">
          <div class="card-count" id="cardCount">狀態卡 01 / 12</div>
          <div class="progress-bar" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
          <h2 class="card-title" id="cardTitle"></h2>
          <p class="question" id="cardQuestion"></p>
          <div class="measure" id="cardMeasure" aria-label="測量指標"></div>
          <div class="options" id="options"></div>
          <p class="card-note" id="cardNote"></p>
          <div class="nav-row">
            <button class="ghost-btn" type="button" id="backBtn">返回上一題</button>
            <div class="status-text" id="answerStatus">選擇一張牌面答案後會自動前進</div>
          </div>
        </article>
      </section>

      <section id="pauseScreen" class="screen pause">
        <div class="pause-card">
          <div class="pause-symbol" aria-hidden="true">☾</div>
          <h2>前額葉啟動</h2>
          <p>先深呼吸一下。<br />接下來不是判他有罪，<br />而是把選擇權拿回你手上。</p>
          <button class="primary-btn" type="button" id="showResultBtn">查看我的關係狀態</button>
        </div>
      </section>

      <section id="resultScreen" class="screen">
        <article class="result-card" id="shareCard">
          <p class="result-kicker">你的關係狀態：</p>
          <h2 class="result-name" id="resultName"></h2>
          <p class="result-translation" id="resultTranslation"></p>
          <div class="insight" id="resultInsight"></div>
          <section class="stuck-panel" aria-labelledby="stuckTitle">
            <h3 id="stuckTitle">你主要卡在這裡</h3>
            <div class="metrics" id="metrics" aria-label="主要指標"></div>
          </section>
          <div class="advice">
            <h3>前額葉建議</h3>
            <p id="resultAdvice"></p>
          </div>
          <div class="cta-box">私訊「狀態整理」，我陪你用 7 張牌看清楚。</div>
          <div class="result-actions">
            <button class="ghost-btn" type="button" id="restartBtn">重新測一次</button>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const cards = [
      { id: "01", hookTitle: "他有時很熱，有時又像消失？", answerStatement: "他的忽冷忽熱，常常讓我忍不住一直猜他到底在想什麼。", microCopy: "不穩定的溫柔，最容易讓人誤以為是心動。", weights: { UA: 1, PR: 0.5 } },
      { id: "02", hookTitle: "你們一直卡在「不知道算什麼」？", answerStatement: "我們之間有曖昧、有親密、有期待，但關係定位一直很模糊。", microCopy: "模糊不是浪漫，模糊有時是讓你繼續等的空間。", weights: { PR: 1, TC: 0.5 } },
      { id: "03", hookTitle: "他是不是每次你快放下時，又剛好出現？", answerStatement: "每次我快要放下，他就會突然變溫柔、突然關心，讓我又捨不得走。", microCopy: "麵包屑不是愛，是剛好不讓你走的訊號。", weights: { BC: 1, UA: 0.5 } },
      { id: "04", hookTitle: "他講過很多以後，但很少真的做到？", answerStatement: "他說過很多之後、有一天、等我忙完，但真正落地的行動很少。", microCopy: "承諾如果沒有行動，就只是讓你繼續等的劇本。", weights: { PR: 1, BC: 0.5 } },
      { id: "05", hookTitle: "你常常懷疑自己是不是太敏感？", answerStatement: "我明明感覺不舒服，卻常常被他說到懷疑是不是自己太敏感、太愛想。", microCopy: "當你開始不相信自己的感覺，這段互動就已經影響你了。", weights: { GL: 1, SC: 0.5 } },
      { id: "06", hookTitle: "你提出需求後，最後反而變成你在道歉？", answerStatement: "我本來只是想說出不安或需求，但聊到最後，常常變成我在解釋、安撫，甚至道歉。", microCopy: "健康的溝通，不會讓提出需求的人變成罪人。", weights: { GL: 1, CC: 1 } },
      { id: "07", hookTitle: "他情緒不好時，你會覺得自己有責任讓他好起來？", answerStatement: "只要他低落、崩潰或脆弱，我就會自動進入照顧模式，覺得自己不能離開。", microCopy: "你可以關心他，但你不是他的情緒急救站。", weights: { NA: 1, SC: 0.5 } },
      { id: "08", hookTitle: "你享受他只對你示弱的感覺？", answerStatement: "當他說只有我懂他、只會跟我講這些時，我會覺得自己很特別、很重要。", microCopy: "被當成例外很迷人，但不等於被真正選擇。", weights: { NA: 1, AV: 1 } },
      { id: "09", hookTitle: "你常常等他的訊息等到生活亂掉？", answerStatement: "我會一直看手機、猜他為什麼沒回，也會因為他的訊息影響整天心情。", microCopy: "如果你的一天被他的訊息控制，那成本已經開始變高。", weights: { TC: 1, UA: 0.5 } },
      { id: "10", hookTitle: "這段關係讓你越來越不像自己？", answerStatement: "在這段關係裡，我變得更焦慮、更小心、更常自責，也越來越不敢直接表達自己。", microCopy: "一段關係最貴的成本，是你慢慢失去自己。", weights: { SC: 1, GL: 0.5 } },
      { id: "11", hookTitle: "跟他互動後，你有感覺被珍惜嗎？", answerStatement: "跟他互動後，我真的有感覺自己被尊重、被在乎、被好好對待。", microCopy: "真正的喜歡，不只讓你心跳，也會讓你感到安定。", weights: { EMV: 1 } },
      { id: "12", hookTitle: "你是真的喜歡他，還是被刺激感綁住？", answerStatement: "我放不下的，更多是那種忽冷忽熱、時好時壞、讓我一直想確認的刺激感。", microCopy: "有些心動，不是愛變深，而是不確定性變高。", weights: { AV: 1, UA: 0.5 } }
    ];

    const options = [
      { label: "完全不像", score: 0 },
      { label: "有一點像", score: 1 },
      { label: "很像", score: 2 },
      { label: "根本就是我", score: 3 }
    ];

    const resultCopy = {
      "穩定滋養型": {
        translation: "你在這段關係裡，不只是心動，也有被穩定對待。",
        insights: [
          "你不需要一直猜，也不需要一直證明自己值得被愛。",
          "這段互動目前比較能讓你感到安心、被尊重，也比較不會讓你失去自己。"
        ],
        advice: "保持觀察，也保持自己的生活節奏。穩定的關係不需要讓你失去自己。"
      },
      "可修正低谷型": {
        translation: "這段關係有壓力，但還不一定是死巷。",
        insights: [
          "目前的問題不一定代表完全沒救，但需要看見具體行動，而不是只聽承諾。",
          "真正的重點是，接下來有沒有穩定、具體、可持續的改善。"
        ],
        advice: "設定 14 到 30 天觀察期，只看行動，不看情緒承諾。"
      },
      "高消耗牽引型": {
        translation: "你不是沒有感覺，而是這段關係讓你付出的成本已經偏高。",
        insights: [
          "你可能一直在想，再努力一點是不是就會變好。",
          "但如果一段關係長期讓你等、猜、自責、生活變亂，那就不是單純的愛，而是消耗正在變高。"
        ],
        advice: "先降低投入，不要再用更多消耗證明自己值得被愛。"
      },
      "不確定性上癮型": {
        translation: "你放不下的，可能不是愛本身，而是下一次回溫的期待。",
        insights: [
          "有時很甜，有時消失；有時靠近，有時又讓你猜。",
          "這種不穩定會讓大腦一直等待下一次獎賞，久了就容易把焦慮誤認成心動。"
        ],
        advice: "接下來 7 天，先停止解碼每一則訊息，只觀察對方是否有穩定行動。"
      },
      "被需要上癮型": {
        translation: "你可能把「被需要」誤認成「被愛」。",
        insights: [
          "你很會照顧人，也很容易因為自己對他很重要，就忽略自己其實也需要被照顧。",
          "被需要很迷人，但如果只有你在承接他，這段關係就會慢慢失衡。"
        ],
        advice: "問自己一句：這段關係有沒有也照顧到我？"
      },
      "煤氣燈覺察型": {
        translation: "你可能正在慢慢失去對自己感受的信任。",
        insights: [
          "當你每次提出不安，最後都變成你在懷疑自己，這段互動就已經開始影響你的判斷。",
          "你不是一定太敏感，你可能只是太常被否定。"
        ],
        advice: "先把事實寫下來，不要只靠當下情緒判斷。你需要的是重新相信自己的感覺。"
      },
      "海王雷達高警示型": {
        translation: "這段互動出現明顯高風險訊號。",
        insights: [
          "對方不一定是故意傷害你，但目前的模式可能正在讓你一直猜、一直等、一直消耗。",
          "這不是要你立刻判他有罪，而是提醒你先保護自己的時間、情緒和自我價值。"
        ],
        advice: "先停止加碼投入，觀察對方是否有穩定、具體、可持續的行動。"
      }
    };

    const metricLabels = {
      PR: "關係模糊與高風險訊號",
      BC: "麵包屑與回溫牽引",
      GL: "自我懷疑與感受被否定",
      NA: "被需要感與照顧者模式",
      UA: "不確定性與忽冷忽熱牽引",
      TC: "等待與時間消耗",
      SC: "自我流失與情緒消耗",
      CC: "溝通壓力與反覆解釋",
      AV: "刺激感與吸引力陷阱",
      EMV: "被珍惜與情感收益"
    };

    const metricMax = {
      PR: 6,
      BC: 4.5,
      GL: 6,
      NA: 6,
      UA: 6,
      TC: 4.5,
      SC: 6,
      CC: 3,
      AV: 6,
      EMV: 3
    };

    const metricDescriptions = {
      PR: "關係定位越模糊，越容易讓你一直等待對方表態。",
      BC: "對方偶爾回溫，可能剛好勾住你快放下的地方。",
      GL: "你可能太常被帶到懷疑自己的感覺。",
      NA: "你容易進入照顧者模式，把被需要當成被愛。",
      UA: "忽冷忽熱正在牽動你，讓你一直想確認下一次回溫。",
      TC: "你的時間與注意力，可能已經被等待訊息佔走太多。",
      SC: "這段互動正在消耗你的自我感與情緒穩定。",
      CC: "你可能花很多力氣解釋需求、安撫對方或修復對話。",
      AV: "你放不下的可能是起伏感，而不一定是穩定的愛。",
      EMV: "這代表你感受到被珍惜、被尊重、被好好對待的程度。"
    };

    const allScores = ["UA", "PR", "BC", "GL", "NA", "TC", "SC", "CC", "AV", "EMV"];
    const answers = Array(cards.length).fill(null);
    let current = 0;

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const pauseScreen = document.getElementById("pauseScreen");
    const resultScreen = document.getElementById("resultScreen");
    const cardCount = document.getElementById("cardCount");
    const progressFill = document.getElementById("progressFill");
    const cardTitle = document.getElementById("cardTitle");
    const cardQuestion = document.getElementById("cardQuestion");
    const cardMeasure = document.getElementById("cardMeasure");
    const cardNote = document.getElementById("cardNote");
    const optionsEl = document.getElementById("options");
    const answerStatus = document.getElementById("answerStatus");

    function showScreen(screen) {
      [startScreen, quizScreen, pauseScreen, resultScreen].forEach((item) => item.classList.remove("active"));
      screen.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderCard() {
      const card = cards[current];
      cardCount.textContent = `狀態卡 ${card.id} / ${String(cards.length).padStart(2, "0")}`;
      progressFill.style.width = `${((current + 1) / cards.length) * 100}%`;
      cardTitle.textContent = card.hookTitle;
      cardQuestion.textContent = card.answerStatement;
      cardNote.textContent = card.microCopy;
      cardMeasure.innerHTML = "";
      cardMeasure.hidden = true;
      optionsEl.innerHTML = "";
      options.forEach((option, index) => {
        const button = document.createElement("button");
        button.className = `option-btn${answers[current] === option.score ? " selected" : ""}`;
        button.type = "button";
        button.setAttribute("aria-label", `${option.label}，${option.score} 分`);
        button.innerHTML = `<span class="option-number">${index + 1}</span><span>${option.label}</span>`;
        button.addEventListener("click", () => chooseAnswer(option.score));
        optionsEl.appendChild(button);
      });
      document.getElementById("backBtn").disabled = current === 0;
      answerStatus.textContent = answers[current] === null ? "選擇一張牌面答案後會自動前進" : `已選：${options[answers[current]].label}，可重新選擇修改`;
    }

    function chooseAnswer(score) {
      answers[current] = score;
      renderCard();
      window.setTimeout(() => {
        if (current < cards.length - 1) {
          current += 1;
          renderCard();
          document.querySelector(".card").scrollIntoView({ block: "start", behavior: "smooth" });
        } else {
          showScreen(pauseScreen);
        }
      }, 180);
    }

    function calculateScores() {
      const scores = Object.fromEntries(allScores.map((key) => [key, 0]));
      answers.forEach((answer, index) => {
        const score = answer ?? 0;
        Object.entries(cards[index].weights).forEach(([key, weight]) => {
          scores[key] += score * weight;
        });
      });
      return scores;
    }

    function decideResult(scores) {
      if (scores.PR >= 4 && scores.BC >= 2 && scores.EMV <= 1) return "海王雷達高警示型";
      if (scores.GL >= 4 && scores.SC >= 2) return "煤氣燈覺察型";
      if (scores.UA >= 3 && (scores.PR >= 3 || scores.BC >= 2)) return "不確定性上癮型";
      if (scores.NA >= 4 && scores.AV >= 2) return "被需要上癮型";
      if (scores.TC >= 2 && scores.SC >= 2 && scores.EMV <= 1) return "高消耗牽引型";
      if ((scores.TC >= 2 || scores.SC >= 2) && scores.PR <= 3 && scores.GL <= 3 && scores.NA <= 3 && scores.UA <= 2 && scores.EMV >= 1) return "可修正低谷型";
      if (scores.PR <= 2 && scores.GL <= 2 && scores.NA <= 2 && scores.UA <= 1 && scores.TC <= 1 && scores.SC <= 1 && scores.EMV >= 2) return "穩定滋養型";
      return (scores.TC >= 2 || scores.SC >= 2 || scores.EMV <= 1) ? "高消耗牽引型" : "可修正低谷型";
    }

    function renderResult() {
      const scores = calculateScores();
      const resultName = decideResult(scores);
      const copy = resultCopy[resultName];
      document.getElementById("resultName").textContent = resultName;
      document.getElementById("resultTranslation").textContent = copy.translation;
      document.getElementById("resultInsight").innerHTML = copy.insights.map((line) => `<p>${line}</p>`).join("");
      document.getElementById("resultAdvice").textContent = copy.advice;

      const metrics = document.getElementById("metrics");
      metrics.innerHTML = "";
      Object.keys(metricLabels)
        .map((key) => ({ key, value: Math.round(scores[key] * 10) / 10, max: metricMax[key] }))
        .sort((a, b) => {
          const aSignal = a.key === "EMV" ? 1 - (a.value / a.max) : a.value / a.max;
          const bSignal = b.key === "EMV" ? 1 - (b.value / b.max) : b.value / b.max;
          return bSignal - aSignal;
        })
        .slice(0, 3)
        .forEach(({ key, value, max }) => {
          const signal = key === "EMV" ? 1 - (value / max) : value / max;
          const level = signal >= 0.66 ? "高" : signal >= 0.34 ? "中" : "低";
          const row = document.createElement("div");
          row.className = "metric";
          row.innerHTML = `
            <div>
              <span class="metric-name">${metricLabels[key]}</span>
              <p>${metricDescriptions[key]}</p>
            </div>
            <span class="metric-level ${level === "高" ? "high" : level === "中" ? "medium" : "low"}">${level}</span>
          `;
          metrics.appendChild(row);
        });
      showScreen(resultScreen);
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      current = 0;
      renderCard();
      showScreen(quizScreen);
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      if (current > 0) {
        current -= 1;
        renderCard();
        document.querySelector(".card").scrollIntoView({ block: "start", behavior: "smooth" });
      }
    });

    document.getElementById("showResultBtn").addEventListener("click", renderResult);

    document.getElementById("restartBtn").addEventListener("click", () => {
      answers.fill(null);
      current = 0;
      renderCard();
      showScreen(startScreen);
    });
  </script>
</body>
</html>
