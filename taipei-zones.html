<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BodyFix 台北服務據點需求登記</title>
  <style>
    /* premium-form-refresh */
    :root {
      --bg: #f2eee6;
      --paper: #f8f5ef;
      --card: #fbfaf7;
      --ink: #122738;
      --ink-soft: #2a3e4e;
      --gold: #b59a69;
      --gold-soft: #d7c7a7;
      --line: #ded4c2;
      --accent: #0f2d44;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 9%, rgba(181,154,105,0.10), transparent 26%),
        repeating-radial-gradient(circle at 8% 18%, rgba(18,39,56,0.03) 0 2px, transparent 2px 14px),
        linear-gradient(130deg, rgba(255,255,255,0.22), transparent 34%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap { max-width: 960px; margin: 0 auto; padding: 18px 14px 36px; }
    .brand-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
    .brand-badge {
      pointer-events: none;
      width: 84px; min-width: 84px; height: 84px;
      background: linear-gradient(160deg, #0c2740, #081b30);
      border: 1px solid #c7a873;
      color: #e8d2a6; border-radius: 4px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      box-shadow: 0 6px 14px rgba(15, 35, 53, 0.14);
      letter-spacing: 0.3px;
      padding: 8px 6px 7px;
    }
    .brand-badge-main {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 50px;
      line-height: 0.9;
      color: #d7bb88;
    }
    .brand-badge-sub {
      margin-top: 9px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 11px;
      letter-spacing: 3.2px;
      color: #d7bb88;
    }

    h1 { margin: 0 0 8px; font-size: clamp(24px, 4.4vw, 40px); letter-spacing: 0.3px; font-family: Georgia, "Noto Serif TC", serif; }
    .hero-title { display: flex; flex-direction: column; gap: 2px; }
    .brand-line, .title-line { display: block; line-height: 1.12; }
    .lead { color: var(--ink-soft); line-height: 1.6; font-size: 15px; max-width: 700px; margin: 0; }
    .divider { display: flex; align-items: center; gap: 8px; margin: 8px 0 12px; color: var(--gold); }
    .divider::before, .divider::after { content: ""; height: 1px; background: linear-gradient(to right, transparent, var(--gold-soft), transparent); flex: 1; }
    .divider::before, .divider::after { pointer-events: none; }

    .notice {
      background: var(--paper);
      border: 1px solid var(--gold-soft);
      border-left: 3px solid var(--gold);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      box-shadow: 0 4px 12px rgba(18, 39, 56, 0.06);
    }
    .notice p { margin: 0; line-height: 1.5; color: var(--ink-soft); font-size: 14px; }

    .form-card {
      position: relative;
      z-index: 2;
      background: var(--card);
      border: 1px solid var(--gold-soft);
      border-radius: 10px;
      padding: 10px 12px;
      box-shadow: 0 8px 20px rgba(18, 39, 56, 0.06);
    }

    .q-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
    .q-item {
      border-top: 1px solid var(--line);
      padding: 12px 4px;
    }
    .q-item:first-child { border-top: none; }

    .q-head { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .q-num {
      width: 30px; height: 30px; border-radius: 999px; background: #0f2640; color: #f5e7cc;
      display: inline-flex; align-items: center; justify-content: center; font-weight: 700; letter-spacing: 0.5px;
      border: 1px solid var(--gold);
      font-size: 12px;
    }
    .q-title { margin: 0; font-size: 19px; font-family: "Noto Serif TC", Georgia, serif; }

    .choices { position: relative; z-index: 4; display: flex; flex-wrap: wrap; gap: 8px; }
    .pill-option { position: relative; z-index: 5; display: inline-flex; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .pill-option input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }
    .pill-option span {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 40px; padding: 8px 14px;
      border-radius: 999px; border: 1px solid #b59a69;
      background: #f8f5ef; color: #0f2d44; cursor: pointer;
      font-size: 15px; line-height: 1.3;
      transition: all .18s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .pill-option:hover span { border-color: var(--gold); color: var(--ink); }
    .pill-option input:focus-visible + span { outline: 2px solid #2f4e69; outline-offset: 2px; }
    .pill-option input:checked + span {
      background: linear-gradient(180deg, #12344f, #0e2b42);
      color: #f8f5ef;
      border: 1px solid #c6a46e;
      box-shadow: 0 4px 12px rgba(16, 46, 71, 0.25);
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .field {
      width: 100%; border: 1px solid #cdbf9f; border-radius: 10px; padding: 12px 14px;
      background: #fffefc; color: var(--ink); font-size: 16px;
    }
    .field:focus { outline: 2px solid #355774; border-color: #355774; }
    textarea.field { min-height: 100px; resize: vertical; }

    .submit-wrap { text-align: center; padding: 6px 0 4px; }
    button[type="submit"] {
      width: min(100%, 300px); min-height: 46px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      background: linear-gradient(180deg, #15354f, #0c253a);
      color: #f5e2bf; font-size: 20px; font-family: "Noto Serif TC", Georgia, serif;
      cursor: pointer; letter-spacing: 1px;
    }

    #message { margin-top: 14px; font-weight: 700; color: #8d2f2f; text-align: center; line-height: 1.6; }

    .footnote { text-align: center; color: var(--ink-soft); margin-top: 22px; }

    @media (max-width: 900px) {
      .two-col { grid-template-columns: 1fr; gap: 0; }
      .brand-badge { width: 76px; min-width: 76px; height: 76px; }
      .brand-badge-main { font-size: 43px; }
      .brand-badge-sub { font-size: 10px; letter-spacing: 2.8px; margin-top: 8px; }
      .lead { font-size: 14px; }
      .q-title { font-size: 18px; }
    }

    @media (max-width: 640px) {
      .brand-top { align-items: flex-start; gap: 12px; }
      .hero-title { margin-right: 4px; }
      .brand-line { font-size: clamp(29px, 8.3vw, 36px); }
      .title-line {
        font-size: clamp(20px, 5.8vw, 26px);
        letter-spacing: 0.25px;
        white-space: nowrap;
      }
      .brand-badge {
        width: 80px;
        min-width: 80px;
        height: 80px;
        border-radius: 4px;
        margin-top: 4px;
      }
      .brand-badge-main { font-size: 46px; }
      .brand-badge-sub { font-size: 10px; letter-spacing: 3px; margin-top: 8px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="brand-top">
      <div>
        <h1 class="hero-title">
          <span class="brand-line">BodyFix</span>
          <span class="title-line">台北服務區域登記</span>
        </h1>
        <p class="lead">六張犁為目前固定服務點。<br>如果你希望未來在西門、國父紀念館或到府整理，可以留下區域需求。</p>
        <div class="divider">◆</div>
      </div>
      <div class="brand-badge" aria-label="BodyFix 品牌標識">
        <div class="brand-badge-main">BF</div>
        <div class="brand-badge-sub">BODYFIX</div>
      </div>
    </section>

    <section class="notice">
      <p>非正式預約，不需付款。僅用於區域需求、距離阻力與時段安排。</p>
    </section>

    <form id="form" class="form-card">
      <div class="q-grid">
        <section class="q-item">
          <div class="q-head"><span class="q-num">01</span><h2 class="q-title">你希望 BodyFix 優先開放哪個據點？</h2></div>
          <div class="choices">
            <label class="pill-option"><input type="radio" name="preferred_zone" value="ximen" required><span>西門</span></label>
            <label class="pill-option"><input type="radio" name="preferred_zone" value="liuzhangli"><span>六張犁</span></label>
            <label class="pill-option"><input type="radio" name="preferred_zone" value="sun_yat_sen_memorial_hall"><span>國父紀念館</span></label>
            <label class="pill-option"><input type="radio" name="preferred_zone" value="home_visit"><span>到府整理</span></label>
            <label class="pill-option"><input type="radio" name="preferred_zone" value="other"><span>其他地區</span></label>
          </div>
        </section>

        <section class="q-item">
          <div class="q-head"><span class="q-num">02</span><h2 class="q-title">六張犁對你來說方便嗎？</h2></div>
          <div class="choices">
            <label class="pill-option"><input type="radio" name="liuzhangli_distance_feeling" value="convenient" required><span>方便</span></label>
            <label class="pill-option"><input type="radio" name="liuzhangli_distance_feeling" value="acceptable"><span>還可以</span></label>
            <label class="pill-option"><input type="radio" name="liuzhangli_distance_feeling" value="a_bit_far"><span>有點遠</span></label>
            <label class="pill-option"><input type="radio" name="liuzhangli_distance_feeling" value="too_far_affects_booking"><span>太遠會影響預約意願</span></label>
          </div>
        </section>

        <section class="q-item">
          <div class="q-head"><span class="q-num">03</span><h2 class="q-title">你主要想處理什麼？</h2></div>
          <div class="choices">
            <label class="pill-option"><input type="radio" name="main_need" value="neck_shoulder_chest" required><span>肩頸胸廓</span></label>
            <label class="pill-option"><input type="radio" name="main_need" value="lower_back_pelvis"><span>下背骨盆</span></label>
            <label class="pill-option"><input type="radio" name="main_need" value="hip_legs"><span>髖與腿</span></label>
            <label class="pill-option"><input type="radio" name="main_need" value="training_recovery"><span>重訓恢復</span></label>
            <label class="pill-option"><input type="radio" name="main_need" value="movement_training"><span>教練課／動作整合</span></label>
            <label class="pill-option"><input type="radio" name="main_need" value="twelve_session_plan"><span>12次完整計畫諮詢</span></label>
            <label class="pill-option"><input type="radio" name="main_need" value="ziwei_tarot"><span>紫微／塔羅</span></label>
            <label class="pill-option"><input type="radio" name="main_need" value="other"><span>其他</span></label>
          </div>
        </section>

        <div class="two-col">
          <section class="q-item">
            <div class="q-head"><span class="q-num">04</span><h2 class="q-title">你預計想安排的服務長度？</h2></div>
            <div class="choices">
              <label class="pill-option"><input type="radio" name="session_length_preference" value="sixty_main" required><span>60分鐘為主</span></label>
              <label class="pill-option"><input type="radio" name="session_length_preference" value="sixty_plus_30_if_needed"><span>60分鐘若適合可加購+30</span></label>
              <label class="pill-option"><input type="radio" name="session_length_preference" value="consult_first"><span>想先諮詢哪種長度適合</span></label>
            </div>
          </section>

          <section class="q-item">
            <div class="q-head"><span class="q-num">05</span><h2 class="q-title">你偏好的服務方式？</h2></div>
            <div class="choices">
              <label class="pill-option"><input type="radio" name="service_mode" value="studio" required><span>工作室</span></label>
              <label class="pill-option"><input type="radio" name="service_mode" value="home_visit"><span>到府</span></label>
              <label class="pill-option"><input type="radio" name="service_mode" value="flexible"><span>都可以</span></label>
              <label class="pill-option"><input type="radio" name="service_mode" value="consult_first"><span>想先諮詢</span></label>
            </div>
          </section>
        </div>

        <div class="two-col">
          <section class="q-item">
            <div class="q-head"><span class="q-num">06</span><h2 class="q-title">你比較方便的時段？（可複選）</h2></div>
            <div class="choices">
              <label class="pill-option"><input type="checkbox" name="preferred_time" value="weekday_afternoon"><span>平日下午</span></label>
              <label class="pill-option"><input type="checkbox" name="preferred_time" value="weekday_evening"><span>平日晚上</span></label>
              <label class="pill-option"><input type="checkbox" name="preferred_time" value="weekend_daytime"><span>週末白天</span></label>
              <label class="pill-option"><input type="checkbox" name="preferred_time" value="weekend_evening"><span>週末晚上</span></label>
              <label class="pill-option"><input type="checkbox" name="preferred_time" value="flexible"><span>彈性</span></label>
            </div>
          </section>

          <section class="q-item">
            <div class="q-head"><span class="q-num">07</span><h2 class="q-title">你是舊客戶嗎？</h2></div>
            <div class="choices">
              <label class="pill-option"><input type="radio" name="is_existing_client" value="yes" required><span>是</span></label>
              <label class="pill-option"><input type="radio" name="is_existing_client" value="no"><span>否</span></label>
              <label class="pill-option"><input type="radio" name="is_existing_client" value="unknown"><span>不確定</span></label>
            </div>
          </section>
        </div>

        <section class="q-item">
          <div class="q-head"><span class="q-num">08</span><h2 class="q-title">聯絡方式類型</h2></div>
          <div class="choices">
            <label class="pill-option"><input type="radio" name="contact_type" value="line" required><span>LINE</span></label>
            <label class="pill-option"><input type="radio" name="contact_type" value="instagram"><span>Instagram</span></label>
            <label class="pill-option"><input type="radio" name="contact_type" value="phone"><span>電話</span></label>
            <label class="pill-option"><input type="radio" name="contact_type" value="other"><span>其他</span></label>
          </div>
        </section>

        <div class="two-col">
          <section class="q-item">
            <div class="q-head"><span class="q-num">09</span><h2 class="q-title">聯絡方式</h2></div>
            <input class="field" name="contact_value" required placeholder="請填寫你的聯絡資訊，例如 LINE ID / IG 帳號 / 電話號碼">
          </section>

          <section class="q-item">
            <div class="q-head"><span class="q-num">10</span><h2 class="q-title">備註</h2></div>
            <textarea class="field" name="note" rows="4" placeholder="有任何想補充的內容，歡迎告訴我"></textarea>
          </section>
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit">送出我的區域需求</button>
        <div id="message"></div>
      </div>
    </form>

    <p class="footnote">如果某一區需求夠多，我會優先安排該區時段。</p>
  </main>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.currentTarget;
      const data = Object.fromEntries(new FormData(form).entries());
      data.preferred_time = Array.from(form.querySelectorAll('input[name="preferred_time"]:checked')).map((el) => el.value);
      const res = await fetch('/api/taipei-zone-register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      const json = await res.json();
      const msg = document.getElementById('message');
      if (json.ok) {
        msg.style.color = '#234634';
        msg.textContent = '已收到你的需求登記。感謝你提供資訊！這不是正式預約，我會依據整體需求統計安排後續開放時段。';
        form.reset();
      } else {
        msg.style.color = '#8d2f2f';
        msg.textContent = json.error || '送出失敗，請稍後再試。';
      }
    });
  </script>
</body>
</html>
