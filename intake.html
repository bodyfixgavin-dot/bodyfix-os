<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BODYFIX · BOOKING INTAKE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1A2744;
      --ivory: #F5F0E8;
      --mist: #B0AEA8;
      --gold: #C4956A;
      --card: rgba(255,255,255,0.035);
      --card-border: rgba(196,149,106,0.22);
      --input-bg: rgba(26,39,68,0.58);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--navy);color:var(--ivory);font-family:"Noto Sans TC",system-ui,sans-serif;line-height:1.6}
    .wrap{max-width:780px;margin:0 auto;padding:24px 16px 120px}
    .brand{font-family:"DM Mono",monospace;letter-spacing:.1em;color:var(--gold);font-size:13px;margin-bottom:6px}
    h1{font-family:"Cormorant Garamond","Noto Sans TC",serif;font-size:36px;margin:0 0 2px;font-weight:600}
    .lead{color:var(--mist);margin:0 0 22px}
    .card{background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:16px;margin-bottom:16px}
    .card h2{margin:0 0 10px;font-size:18px;color:var(--gold)}
    .field{margin-bottom:14px}
    label{display:block;font-size:14px;margin-bottom:6px;color:var(--ivory)}
    input,textarea,select{width:100%;background:var(--input-bg);border:1px solid var(--card-border);color:var(--ivory);padding:11px 12px;border-radius:6px;font:inherit}
    textarea{min-height:88px;resize:vertical}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,149,106,.15)}
    .hint{font-size:13px;color:var(--mist)}
    .sticky{position:fixed;left:0;right:0;bottom:0;background:rgba(20,30,54,.95);border-top:1px solid var(--card-border);padding:12px 16px}
    .cta{display:block;width:min(760px,100%);margin:0 auto;background:var(--gold);color:#1C1C1A;border:none;border-radius:8px;padding:14px 16px;font-size:16px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">BODYFIX · BOOKING INTAKE</div>
    <h1>預約前問卷</h1>
    <p class="lead">花 2 分鐘，讓我在見面前先看懂你的身體狀態。</p>

    <section class="card">
      <h2>為什麼要先填？</h2>
      <p>每個人的身體狀態不同。這份問卷可以讓我在你來之前先了解你的狀況，見面後不用花太多時間重複問問題，可以更快進入判讀與整理。沒有標準答案，照你的感覺寫就好。</p>
    </section>

    <form id="intakeForm" class="card">
      <div class="field"><label for="name">稱呼</label><input id="name" name="name" required></div>
      <div class="field"><label for="line">LINE ID</label><input id="line" name="line"></div>
      <div class="field"><label for="goal">這次最想處理的問題</label><textarea id="goal" name="goal" required></textarea></div>
      <div class="field"><label for="duration">症狀持續多久？</label><input id="duration" name="duration"></div>
      <div class="field"><label for="pain">目前不舒服程度（0-10）</label><input id="pain" name="pain" type="number" min="0" max="10"></div>
      <div class="field"><label for="history">過去做過哪些處理？</label><textarea id="history" name="history"></textarea></div>
      <div class="field"><label for="other">還有什麼想先讓我知道？</label><textarea id="other" name="other"></textarea></div>
      <p class="hint">送出後會自動複製內容，並開啟 LINE 對話讓你貼上傳送。</p>
    </form>
  </main>

  <div class="sticky">
    <button class="cta" id="submitBtn" type="button">填好了，複製並送出</button>
  </div>

  <script>
    const btn = document.getElementById('submitBtn');
    const form = document.getElementById('intakeForm');

    function buildMessage() {
      const data = new FormData(form);
      const lines = [
        '【BodyFix 預約前問卷】',
        `稱呼：${data.get('name') || ''}`,
        `LINE ID：${data.get('line') || ''}`,
        `最想處理：${data.get('goal') || ''}`,
        `持續時間：${data.get('duration') || ''}`,
        `不舒服程度：${data.get('pain') || ''}`,
        `過去處理：${data.get('history') || ''}`,
        `補充：${data.get('other') || ''}`
      ];
      return lines.join('\n');
    }

    btn.addEventListener('click', async () => {
      if (!form.reportValidity()) return;
      const message = buildMessage();
      try { await navigator.clipboard.writeText(message); } catch (e) {}
      const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
      window.open(lineUrl, '_blank');
      btn.textContent = '已複製，前往 LINE 中…';
      setTimeout(() => (btn.textContent = '填好了，複製並送出'), 1800);
    });
  </script>
</body>
</html>
