<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BodyFix 台北據點需求統計（內部）</title>
  <style>
    :root { --bg:#f2efe7; --green:#1f3a31; --green-soft:#314c43; --card:#faf7f1; --line:#d9d2c3; --white:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Noto Sans TC",sans-serif; background:var(--bg); color:var(--green); }
    .wrap { max-width:1200px; margin:0 auto; padding:30px 20px 50px; }
    h1 { margin:0 0 10px; font-size:32px; }
    .desc { margin:0 0 16px; color:var(--green-soft); }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:14px; }
    .toolbar { display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    button { border:none; border-radius:8px; padding:10px 14px; background:var(--green); color:#fff; font-weight:700; cursor:pointer; }
    .hint { font-size:14px; color:var(--green-soft); }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; background:var(--white); }
    table { width:100%; border-collapse:collapse; min-width:1400px; }
    th, td { border-bottom:1px solid #ece6da; padding:10px 12px; text-align:left; vertical-align:top; }
    th { background:#f7f3ea; white-space:nowrap; }
    tr:hover td { background:#fcfaf5; }
    .num { text-align:right; font-variant-numeric: tabular-nums; }
    .muted { color:#6b796f; }

    .mobile-cards { display:none; gap:12px; }
    .zone-card { background:var(--white); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .zone-title { margin:0 0 10px; font-size:18px; font-weight:700; }
    .card-section { margin-bottom:12px; }
    .card-section:last-child { margin-bottom:0; }
    .card-heading { margin:0 0 8px; font-size:13px; color:var(--green-soft); font-weight:700; letter-spacing:.02em; }
    .card-grid { display:grid; grid-template-columns:1fr auto; gap:6px 10px; }
    .card-label { color:var(--green-soft); font-size:14px; }
    .card-value { text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }

    @media (max-width: 767px) {
      .wrap { padding:20px 14px 36px; }
      h1 { font-size:24px; }
      .table-wrap { display:none; }
      .mobile-cards { display:grid; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>BodyFix 台北據點需求統計（內部）</h1>
    <p class="desc">資料來源：<code>GET /api/taipei-zone-summary</code>。此頁僅供內部快速查看需求趨勢。</p>

    <section class="panel toolbar">
      <div id="status" class="hint">尚未載入資料。</div>
      <button id="reloadBtn" type="button">重新整理</button>
    </section>

    <section class="table-wrap" aria-live="polite">
      <table>
        <thead>
          <tr>
            <th>區域</th>
            <th class="num">登記數</th>
            <th class="num">距離阻力人數</th>
            <th class="num">高意願人數</th>
            <th class="num">+30 興趣人數</th>
            <th class="num">60 分鐘主力人數</th>
            <th class="num">到府需求人數</th>
            <th class="num">12 次計畫興趣人數</th>
            <th class="num">訓練興趣人數</th>
            <th class="num">舊客人數</th>
            <th class="num">預估單次營收</th>
            <th class="num">90 分鐘潛在營收</th>
            <th class="num">12 次潛在金額</th>
            <th class="num">粗估總潛在營收</th>
            <th>最後登記時間</th>
            <th>建議動作</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="16" class="muted">載入中…</td></tr>
        </tbody>
      </table>
    </section>

    <section id="mobileCards" class="mobile-cards" aria-live="polite">
      <article class="zone-card"><p class="muted">載入中…</p></article>
    </section>
  </main>

  <script>
    const PRICE_60 = 2000;
    const PRICE_90 = 3200;
    const PRICE_12_SESSION = 36000;

    const statusEl = document.getElementById('status');
    const tbodyEl = document.getElementById('tbody');
    const mobileCardsEl = document.getElementById('mobileCards');
    const reloadBtn = document.getElementById('reloadBtn');

    function pick(row, keys, fallback = '') {
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null) return row[key];
      }
      return fallback;
    }

    function asNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function formatTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return new Intl.DateTimeFormat('zh-TW', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false,
        timeZone: 'Asia/Taipei'
      }).format(d);
    }

    function formatMoney(amount) {
      if (!amount) return '—';
      return `NT$${amount.toLocaleString('en-US')}`;
    }

    function normalizeRow(row) {
      const zone = String(pick(row, ['zone', 'preferred_zone', 'area', 'zone_name'], '-'));
      const total = asNumber(pick(row, ['total_count', 'register_count', 'count']));
      const distanceBarrier = asNumber(pick(row, ['distance_barrier_count', 'distance_resistance_count']));
      const highIntent = asNumber(pick(row, ['high_intent_count', 'strong_intent_count']));
      const plus30 = asNumber(pick(row, ['plus_30_interest_count', 'plus30_interest_count']));
      const sixtyMain = asNumber(pick(row, ['sixty_main_count', 'sixty_minutes_main_count']));
      const homeVisit = asNumber(pick(row, ['home_visit_count', 'home_visit_demand_count']));
      const plan12 = asNumber(pick(row, ['twelve_session_interest_count', 'plan_12_interest_count']));
      const training = asNumber(pick(row, ['training_interest_count', 'movement_training_interest_count']));
      const existing = asNumber(pick(row, ['existing_client_count', 'old_client_count']));
      const lastAt = pick(row, ['last_registered_at', 'last_registration_at', 'last_created_at']);
      const action = pick(row, ['recommended_action', 'suggested_action'], '-');

      const estSingleRevenue = sixtyMain * PRICE_60;
      const potential90Revenue = plus30 * PRICE_90;
      const potential12Revenue = plan12 * PRICE_12_SESSION;
      const potentialTotalRevenue = estSingleRevenue + potential90Revenue + potential12Revenue;

      return {
        zone,
        total,
        distanceBarrier,
        highIntent,
        plus30,
        sixtyMain,
        homeVisit,
        plan12,
        training,
        existing,
        lastAt,
        action: action || '-',
        estSingleRevenue,
        potential90Revenue,
        potential12Revenue,
        potentialTotalRevenue
      };
    }

    function rowHtml(row) {
      return `<tr>
        <td>${row.zone}</td>
        <td class="num">${row.total}</td>
        <td class="num">${row.distanceBarrier}</td>
        <td class="num">${row.highIntent}</td>
        <td class="num">${row.plus30}</td>
        <td class="num">${row.sixtyMain}</td>
        <td class="num">${row.homeVisit}</td>
        <td class="num">${row.plan12}</td>
        <td class="num">${row.training}</td>
        <td class="num">${row.existing}</td>
        <td class="num">${formatMoney(row.estSingleRevenue)}</td>
        <td class="num">${formatMoney(row.potential90Revenue)}</td>
        <td class="num">${formatMoney(row.potential12Revenue)}</td>
        <td class="num">${formatMoney(row.potentialTotalRevenue)}</td>
        <td>${formatTime(row.lastAt)}</td>
        <td>${row.action}</td>
      </tr>`;
    }

    function cardHtml(row) {
      return `<article class="zone-card">
        <h2 class="zone-title">${row.zone}</h2>

        <section class="card-section">
          <h3 class="card-heading">需求統計</h3>
          <div class="card-grid">
            <div class="card-label">登記數</div><div class="card-value">${row.total}</div>
            <div class="card-label">距離阻力人數</div><div class="card-value">${row.distanceBarrier}</div>
            <div class="card-label">高意願人數</div><div class="card-value">${row.highIntent}</div>
            <div class="card-label">+30 興趣人數</div><div class="card-value">${row.plus30}</div>
            <div class="card-label">60 分鐘主力人數</div><div class="card-value">${row.sixtyMain}</div>
            <div class="card-label">到府需求人數</div><div class="card-value">${row.homeVisit}</div>
            <div class="card-label">12 次計畫興趣人數</div><div class="card-value">${row.plan12}</div>
            <div class="card-label">訓練興趣人數</div><div class="card-value">${row.training}</div>
            <div class="card-label">舊客人數</div><div class="card-value">${row.existing}</div>
          </div>
        </section>

        <section class="card-section">
          <h3 class="card-heading">金額試算</h3>
          <div class="card-grid">
            <div class="card-label">預估單次營收</div><div class="card-value">${formatMoney(row.estSingleRevenue)}</div>
            <div class="card-label">90 分鐘潛在營收</div><div class="card-value">${formatMoney(row.potential90Revenue)}</div>
            <div class="card-label">12 次潛在金額</div><div class="card-value">${formatMoney(row.potential12Revenue)}</div>
            <div class="card-label">粗估總潛在營收</div><div class="card-value">${formatMoney(row.potentialTotalRevenue)}</div>
          </div>
        </section>

        <section class="card-section">
          <h3 class="card-heading">其他</h3>
          <div class="card-grid">
            <div class="card-label">最後登記時間</div><div class="card-value">${formatTime(row.lastAt)}</div>
            <div class="card-label">建議動作</div><div class="card-value">${row.action}</div>
          </div>
        </section>
      </article>`;
    }

    async function loadSummary() {
      statusEl.textContent = '載入中…';
      tbodyEl.innerHTML = '<tr><td colspan="16" class="muted">載入中…</td></tr>';
      mobileCardsEl.innerHTML = '<article class="zone-card"><p class="muted">載入中…</p></article>';
      try {
        const res = await fetch('/api/taipei-zone-summary', { method: 'GET' });
        const json = await res.json();
        if (!res.ok || !json.ok) throw new Error(json.error || '讀取失敗');

        const rawRows = Array.isArray(json.data) ? json.data : [];
        const rows = rawRows.map(normalizeRow);
        if (!rows.length) {
          tbodyEl.innerHTML = '<tr><td colspan="16" class="muted">目前尚無統計資料。</td></tr>';
          mobileCardsEl.innerHTML = '<article class="zone-card"><p class="muted">目前尚無統計資料。</p></article>';
          statusEl.textContent = '已載入（0 筆）';
          return;
        }

        tbodyEl.innerHTML = rows.map(rowHtml).join('');
        mobileCardsEl.innerHTML = rows.map(cardHtml).join('');
        statusEl.textContent = `已載入 ${rows.length} 筆區域統計`;
      } catch (err) {
        const message = `載入失敗：${err.message}`;
        tbodyEl.innerHTML = `<tr><td colspan="16" class="muted">${message}</td></tr>`;
        mobileCardsEl.innerHTML = `<article class="zone-card"><p class="muted">${message}</p></article>`;
        statusEl.textContent = '載入失敗';
      }
    }

    reloadBtn.addEventListener('click', loadSummary);
    loadSummary();
  </script>
</body>
</html>
